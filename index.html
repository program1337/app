<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE STARS STORE</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #f39c12; --bg: #0d1117; --card: #161b22; --text: #e6edf3; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: var(--bg); color: var(--text); text-align: center; padding: 15px; direction: rtl; margin: 0; }
        .container { max-width: 450px; margin: auto; }
        
        /* Header Style */
        .header { padding: 20px 0; border-bottom: 1px solid #30363d; margin-bottom: 20px; }
        h2 { color: var(--gold); margin: 0; font-size: 24px; letter-spacing: 1px; }
        .promo-banner { background: linear-gradient(45deg, #f39c12, #e67e22); color: black; padding: 10px; border-radius: 8px; margin: 15px 0; font-weight: bold; font-size: 14px; box-shadow: 0 4px 15px rgba(243, 156, 18, 0.3); }

        .section-title { text-align: right; font-size: 14px; color: #8b949e; margin: 20px 5px 10px; text-transform: uppercase; }
        
        /* Button Style */
        .btn { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 10px; padding: 16px; background: var(--card); color: white; border: 1px solid #30363d; border-radius: 12px; font-size: 16px; cursor: pointer; transition: all 0.2s ease; }
        .btn:active { transform: scale(0.97); background: #21262d; border-color: var(--gold); }
        .price { color: var(--gold); font-weight: 700; font-family: 'Courier New', Courier, monospace; }
        
        /* Payment & Footer */
        .payment-card { background: #090c10; border: 1px dashed #30363d; padding: 15px; border-radius: 12px; text-align: right; margin-top: 10px; }
        .payment-info { font-size: 14px; margin-bottom: 8px; display: flex; justify-content: space-between; }
        .copy-link { color: var(--gold); font-size: 12px; text-decoration: underline; cursor: pointer; }

        .footer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 25px; }
        .f-btn { padding: 14px; border-radius: 10px; border: none; font-weight: bold; font-size: 15px; cursor: pointer; }
        .support { background: #f39c12; color: #000; }
        .proofs { background: #238636; color: white; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>ELITE STARS STORE</h2>
        <div class="promo-banner">🎁 عرض أول شحن: احصل على +10% نجوم مجاناً!</div>
    </div>

    <div class="section-title">⭐ شحن نجوم تليجرام (Stars)</div>
    <button class="btn" onclick="sendOrder('Stars', '50 ⭐ - 400 DA')"><span>50 نجمة</span> <span class="price">400 DA</span></button>
    <button class="btn" onclick="sendOrder('Stars', '100 ⭐ - 780 DA')"><span>100 نجمة</span> <span class="price">780 DA</span></button>
    <button class="btn" onclick="sendOrder('Stars', '200 ⭐ - 1500 DA')"><span>200 نجمة</span> <span class="price">1500 DA</span></button>
    <button class="btn" onclick="sendOrder('Stars', '500 ⭐ - 3600 DA')"><span>500 نجمة</span> <span class="price">3600 DA</span></button>

    <div class="section-title">💎 اشتراكات بريميوم (Premium)</div>
    <button class="btn" onclick="sendOrder('Premium', '3 Months - 3750 DA')"><span>بريميوم 3 أشهر</span> <span class="price">3750 DA</span></button>
    <button class="btn" onclick="sendOrder('Premium', '6 Months - 5500 DA')"><span>بريميوم 6 أشهر</span> <span class="price">5500 DA</span></button>
    <button class="btn" onclick="sendOrder('Premium', '12 Months - 8700 DA')"><span>بريميوم سنة</span> <span class="price">8700 DA</span></button>

    <div class="section-title">💳 طرق الدفع المقبولة</div>
    <div class="payment-card">
        <div class="payment-info"><span>الـ CCP:</span> <span class="copy-link" onclick="copy('0000000000')">نسخ الرقم</span></div>
        <div class="payment-info"><span>بريدي موب:</span> <span class="copy-link" onclick="copy('00799999000000000')">نسخ الـ RIP</span></div>
    </div>

    <div class="footer-grid">
        <button class="f-btn support" onclick="window.open('https://t.me/wuldc', '_blank')">💬 الدعم الفني</button>
        <button class="f-btn proofs" onclick="window.open('https://t.me/ELITESTARSDZ', '_blank')">✅ الإثباتات</button>
    </div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();

    function sendOrder(type, detail) {
        tg.sendData(JSON.stringify({item: type, offer: detail}));
    }

    function copy(text) {
        navigator.clipboard.writeText(text);
        tg.showAlert("تم نسخ الرقم بنجاح! توجه للدفع وأرسل لنا الوصل.");
    }
</script>

</body>
</html>
