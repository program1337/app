<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Stars Store</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: Arial, sans-serif; background-color: #000; color: #fff; text-align: center; padding: 20px; direction: rtl; }
        .btn { display: block; width: 90%; margin: 10px auto; padding: 15px; background: #1a1a1a; color: white; border: 1px solid #333; border-radius: 10px; font-size: 18px; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #333; }
        .price-list { display: none; background: #111; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
        .offer { padding: 10px; border-bottom: 1px solid #222; cursor: pointer; }
        .offer:hover { background: #222; }
    </style>
</head>
<body>
    <h2>⭐️ متجر ELITE STARS ⭐️</h2>
    
    <button class="btn" onclick="toggleOffers('stars-offers')">⭐ شراء نجوم (CCP/Flexy)</button>
    <div id="stars-offers" class="price-list">
        <div class="offer" onclick="sendOrder('نجوم', '50 نجمة - 100 دج')">50 نجمة - 100 دج</div>
        <div class="offer" onclick="sendOrder('نجوم', '100 نجمة - 200 دج')">100 نجمة - 200 دج</div>
        <div class="offer" onclick="sendOrder('نجوم', '500 نجمة - 900 دج')">500 نجمة - 900 دج</div>
    </div>

    <button class="btn" onclick="window.open('https://t.me/Y_U_S_E_F_1_3', '_blank')">💬 طلب الدعم</button>
    <button class="btn" onclick="window.open('https://t.me/ELITESTARSDZ', '_blank')">✅ الإثباتات</button>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        function toggleOffers(id) {
            let el = document.getElementById(id);
            el.style.display = (el.style.display === 'block') ? 'none' : 'block';
        }

        function sendOrder(type, detail) {
            let data = {
                item: type,
                offer: detail
            };
            // إرسال البيانات للبوت وغلق النافذة
            tg.sendData(JSON.stringify(data));
        }
    </script>
</body>
</html>
